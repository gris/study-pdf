name: Release

# Triggered by pushing a tag matching the plugin's version (e.g. "0.1.0", no
# "v" prefix -- Obsidian's own convention, since manifest.json's version field
# has none). Builds from source in a clean environment (not a local machine),
# then attests build provenance for the release assets so users can
# cryptographically verify they were built from this repository's source --
# see https://docs.github.com/en/actions/security-for-github-actions/using-artifact-attestations/using-artifact-attestations-to-establish-provenance-for-builds
on:
  push:
    tags:
      - '[0-9]+.[0-9]+.[0-9]+'

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 20

      - run: npm ci
      - run: npm test
      - run: npm run build

      - name: Verify manifest version matches the tag
        run: |
          MANIFEST_VERSION=$(node -p "require('./manifest.json').version")
          if [ "$MANIFEST_VERSION" != "${GITHUB_REF_NAME}" ]; then
            echo "manifest.json version ($MANIFEST_VERSION) does not match tag (${GITHUB_REF_NAME})"
            exit 1
          fi

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: |
            main.js
            styles.css
            manifest.json

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            main.js manifest.json styles.css \
            --title "${GITHUB_REF_NAME}" \
            --generate-notes
